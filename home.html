<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Git Hub Issues Tracker | Home</title>
     <!-- Custom css -->
    <link rel="stylesheet" href="./custom.css">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="./assets/favicon.png">

    <!-- Icons -->

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />


    <!-- Tailwind + Daisyui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class=" h-screen bg-[#F8FAFC] ">
    <nav>
        <div class="flex justify-around gap-[600px] navbar bg-base-100 shadow-sm">
  <div class="flex gap-2">
    <img src="./assets/git.png">
    <h1 class="font-bold text-[24px]">GitHub Issues Tracker</h1>
  </div>

  <div class="flex gap-2 ">
    <input type="text" placeholder="Search" class="input input-bordered w-24 md:w-auto" />
    <button class="btn btn-primary font-bold ">+ New Issue</button>
  </div>
  </div>
    </nav>



    <main class="max-w-[1110px] h-screen  mx-auto">
        <div class="bg-white p-4 mt-15 rounded-md shadow-lg">
            <button onclick="toggleStyle('allBtn')" id="allBtn" class="btn  pl-10 pr-10">All</button>
            <button onclick="toggleStyle('openBtn')" id="openBtn" class="btn  pl-10 pr-10">Open</button>
            <button onclick="toggleStyle('closedBtn')" id="closedBtn" class="btn  pl-10 pr-10">Closed</button>
        </div>

        <div class="bg-white p-4 mt-15 rounded-md shadow-lg  flex justify-between">
           <div class="flex gap-2 items-center">
            <div>

                <img src="./assets/Aperture.png">
            </div>
            <div>
                <h1 class="font-bold"><span>0</span>Issues</h1>
                <p>Track and manage your project issues</p>
            </div>
           </div>

           <div class="flex items-center gap-2"> 
            <div>

                <img src="./assets/Ellipse 2 (1).png"> 
            </div>
                
            <h1 class="font-bold">Open</h1> 

<div>

    <img src="./assets/Ellipse 2.png"> 
</div>
        
        <h1 class="font-bold">Closed</h1>
        </div>
           </div>

           <hr class="text-[gray]">


           


    </main>







    <script src="./home.js"></script>
</body>
</html>
