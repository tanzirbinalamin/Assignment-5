<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Git Hub Issues Tracker | Home</title>

<!-- Custom css -->
<link rel="stylesheet" href="./custom.css">

<!-- Favicon -->
<link rel="icon" type="image/png" href="./assets/favicon.png">

<!-- Font Awesome -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
crossorigin="anonymous"
referrerpolicy="no-referrer"
/>

<!-- Tailwind + DaisyUI -->
<link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

</head>

<body class="h-screen bg-[#F8FAFC]">

<!-- Navbar -->
<nav>
<div class="flex justify-around gap-[600px] navbar bg-base-100 shadow-sm">

<div class="flex gap-2">
<img src="./assets/git.png">
<h1 class="font-bold text-[24px]">GitHub Issues Tracker</h1>
</div>

<div class="flex gap-2">
<input type="text" placeholder="Search" class="input input-bordered w-24 md:w-auto"/>
<button class="btn btn-primary font-bold">+ New Issue</button>
</div>

</div>
</nav>


<!-- Main -->
<main class="max-w-[1110px] mx-auto">

<!-- Tabs -->
<div class="bg-white p-4 mt-10 rounded-md shadow-lg">

<button onclick="toggleStyle('allBtn');filterIssues('all')" id="allBtn" class="btn btn-primary pl-10 pr-10">
All <span id="allCount">0</span>
</button>

<button onclick="toggleStyle('openBtn');filterIssues('open')" id="openBtn" class="btn pl-10 pr-10">
Open <span id="openCount">0</span>
</button>

<button onclick="toggleStyle('closedBtn');filterIssues('closed')" id="closedBtn" class="btn pl-10 pr-10">
Closed <span id="closedCount">0</span>
</button>

</div>



<div class="bg-white p-4 mt-10 rounded-md shadow-lg flex justify-between">

<div class="flex gap-2 items-center">

<div>
<img src="./assets/Aperture.png">
</div>

<div>
<h1 class="font-bold">
<span id="count">0</span> Issues
</h1>
<p>Track and manage your project issues</p>
</div>

</div>


<div class="flex items-center gap-2">

<div>
<img src="./assets/Ellipse 2 (1).png">
</div>

<h1 class="font-bold">Open</h1>

<div>
<img src="./assets/Ellipse 2.png">
</div>

<h1 class="font-bold">Closed</h1>

</div>

</div>


<hr class="text-gray-300 mt-5">



<section id="card-container" class="grid grid-cols-4 gap-4">


</section>



<dialog id="my_modal_1" class="modal">

<div class="modal-box">

<h3 id="modal-title" class="text-lg font-bold"></h3>
<div class=" mt-2 flex items-center gap-2">
    <div class="bg-[#00A96E] w-[80px] rounded-[25px] p-2"><h1 id="status" class="text-white text-center"></h1></div>
    | <h1>Opened by <span id="name"></span></h1>
    | <h2 id="date"></h2>
</div>
<p id="modal-description" class="py-4"></p>


<div class="modal-action">
<form method="dialog">
<button class="btn btn-primary">Close</button>
</form>
</div>

</div>

</dialog>

</main>


<script src="./home.js"></script>

</body>
</html>
